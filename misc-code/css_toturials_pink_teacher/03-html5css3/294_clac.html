<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    .father {
      width: 200px;
      height: 100px;
      background-color: pink;
    }
    .son {
      /* 宽度永远比父元素小 30px */
      width: calc(100% - 30px);
      height: 20px;
      background-color: orange;
    }
  </style>
  <body>
    <div class="father">
      <div class="son"></div>
    </div>
  </body>
</html>
