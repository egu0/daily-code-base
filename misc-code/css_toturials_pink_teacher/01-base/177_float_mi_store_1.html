<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    .box {
      width: 1200px;
      height: 460px;
      background-color: pink;
      margin: 100px auto;
    }
    .left {
      width: 230px;
      height: 460px;
      background-color: #cfa;
      float: left;
    }
    .right {
      width: 970px;
      height: 460px;
      background-color: #666;
      float: right;
    }
  </style>
  <body>
    <div class="box">
      <div class="left">left</div>
      <div class="right">right</div>
    </div>
  </body>
</html>
