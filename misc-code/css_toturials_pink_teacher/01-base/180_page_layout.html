<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    * {
      padding: 0;
      margin: 0;
    }
    .top {
      height: 40px;
      background-color: #cfa;
    }
    .banner {
      width: 980px;
      height: 90px;
      background-color: #eee;
      margin: 10px auto;
    }
    .body {
      width: 980px;
      height: 350px;
      background-color: #eee;
      margin: 10px auto;
    }
    .body > div {
      width: 230px;
      height: 350px;
      float: left;
      margin-right: 20px;
      background-color: gray;
    }
    .body > .last {
      margin-right: 0;
    }
    .footer {
      height: 40px;
      background-color: #cfa;
    }
  </style>
  <body>
    <div class="top">top</div>
    <div class="banner">banner</div>
    <div class="body">
      <div>1</div>
      <div>2</div>
      <div>3</div>
      <div class="last">4</div>
    </div>
    <div class="footer">footer</div>
  </body>
</html>
