<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    .box {
      width: 200px;
      height: 200px;
      margin: 100px auto;
      border: 1px solid #ccc;
      overflow: hidden;
    }
    .box img {
      width: inherit;
      height: inherit;
      transition: all 0.2s;
    }
    .box:hover img {
      transform: scale(1.2);
    }
  </style>
  <body>
    <div class="box">
      <img src="images/yjtp.png" alt="" />
    </div>
  </body>
</html>
