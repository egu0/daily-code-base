<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      p {
        width: 600px;
        height: 400px;
        background-color: pink;
        display: flex;
      }
      p span {
        width: 150px;
        height: 100px;
        background-color: purple;
        color: #fff;
        font-size: 28px;
        margin: 10px;
      }
      p span:nth-child(2) {
        order: -1;
      }
    </style>
  </head>
  <body>
    <p><span>1</span><span>2</span><span>3</span></p>
  </body>
</html>
