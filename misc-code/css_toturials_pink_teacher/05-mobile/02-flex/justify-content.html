<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>flex-direction</title>
    <style>
      div {
        width: 800px;
        height: 200px;
        background-color: pink;
        /* flex 布局 */
        display: flex;
      }
      div:nth-child(1) {
        justify-content: flex-start;
      }
      div:nth-child(2) {
        justify-content: flex-end;
      }
      div:nth-child(3) {
        justify-content: center;
      }
      div:nth-child(4) {
        justify-content: space-around;
      }
      div:nth-child(5) {
        justify-content: space-between;
      }
      div span {
        width: 150px;
        height: 100px;
        background-color: purple;
        box-sizing: border-box;
        border: 1px solid #fff;
      }
    </style>
  </head>
  <body>
    <div>
      <span>1</span>
      <span>2</span>
      <span>3</span>
      <span>4</span>
    </div>
    <div>
      <span>1</span>
      <span>2</span>
      <span>3</span>
      <span>4</span>
    </div>
    <div>
      <span>1</span>
      <span>2</span>
      <span>3</span>
      <span>4</span>
    </div>
    <div>
      <span>1</span>
      <span>2</span>
      <span>3</span>
      <span>4</span>
    </div>
    <div>
      <span>1</span>
      <span>2</span>
      <span>3</span>
      <span>4</span>
    </div>
  </body>
</html>
