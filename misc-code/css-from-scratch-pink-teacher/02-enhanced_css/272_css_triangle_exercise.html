<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    * {
      padding: 0;
      margin: 0;
    }
    .box {
      background-color: pink;
      border-top: 20px solid red;
      border-right: 20px solid green;
      border-bottom: 20px solid blue;
      border-left: 20px solid yellow;
      margin: 40px auto;
    }
    .l40 {
      width: 40px;
      height: 40px;
    }
    .l20 {
      width: 20px;
      height: 20px;
    }
    .l10 {
      width: 10px;
      height: 10px;
    }
    .l0 {
      width: 0px;
      height: 0px;
    }
    .tri-box {
      width: 0;
      height: 0;
      border-top: 20px solid transparent;
      border-right: 20px solid green;
      border-bottom: 0 solid blue;
      border-left: 0 solid yellow;
      margin: 40px auto;
    }
    .tri-box-2 {
      width: 0;
      height: 0;
      border-top: 35px solid transparent;
      border-right: 20px solid green;
      border-bottom: 0 solid blue;
      border-left: 0 solid yellow;
      margin: 40px auto;
    }
    .target {
      position: relative;
      margin: 40px auto;
      width: 300px;
      height: 40px;
      border: 1px solid red;
    }
    .target .box1 {
      width: 160px;
      height: 40px;
      background-color: red;
    }
    .target .tri-box-x {
      position: absolute;
      top: 0px;
      left: 140px;
      width: 0;
      height: 0;
      border-top: 40px solid transparent;
      border-right: 20px solid #fff;
      border-bottom: 0 solid blue;
      border-left: 0 solid yellow;
    }
  </style>
  <style>
    .price {
      width: 160px;
      height: 24px;
      border: 1px solid red;
      margin: 0 auto;
      line-height: 24px;
    }
    .miaosha {
      position: relative;
      float: left;
      width: 90px;
      height: 100%;
      background-color: red;
      text-align: center;
      color: #fff;
      font-weight: 700;
      margin-right: 8px;
    }
    .miaosha i {
      position: absolute;
      right: 0;
      top: 0;
      height: 0;
      width: 0;
      border-color: transparent #fff transparent transparent;
      border-style: solid;
      border-width: 24px 10px 0 0;
    }
    .origin {
      font-size: 12px;
      color: gray;
      text-decoration: line-through;
    }
  </style>
  <body>
    <div class="l40 box"></div>
    <div class="l20 box"></div>
    <div class="l10 box"></div>
    <div class="l0 box"></div>
    <div class="tri-box"></div>
    <div class="tri-box-2"></div>
    <div class="target">
      <div class="box1"></div>
      <div class="tri-box-x"></div>
    </div>
    <div class="price">
      <span class="miaosha"
        >￥1650
        <i></i>
      </span>
      <span class="origin">￥5650</span>
    </div>
  </body>
</html>
