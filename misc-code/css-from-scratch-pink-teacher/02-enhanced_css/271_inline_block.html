<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    * {
      padding: 0;
      margin: 0;
    }
    .box {
      padding: 30px 0;
      border: 1px solid #eee;
      margin: 100px auto;
      text-align: center;
    }
    .box a {
      text-decoration: none;
      display: inline-block;
      width: 36px;
      height: 36px;
      margin-left: 2px;
      border: 1px solid #ccc;
      background-color: #f7f7f7;
      color: #333;
      text-align: center;
      line-height: 36px;
      font-size: 14px;
    }
    .box .prev,
    .box .next {
      width: 85px;
    }
    .box .current,
    .box .elp {
      border: none;
    }
    .box input {
      width: 40px;
      height: 34px;
      border: 1px solid #ccc;
      padding: 0 3px;
      outline: none;
    }
    .box button {
      width: 60px;
      height: 36px;
      background-color: #f7f7f7;
      color: #333;
      border: 1px solid #ccc;
    }
    .box2 {
      margin: 100px auto;
      border: 1px solid #eee;
      text-align: center;
      padding: 30px 0;
    }
    .box2 a {
      display: inline-block;
      width: 36px;
      height: 36px;
      text-decoration: none;
      line-height: 36px;
      text-align: center;
      border: 1px solid #eee;
      margin-left: 2px;
    }
  </style>
  <body>
    <div class="box">
      <a href="#" class="prev">&lt;&lt;上一页</a
      ><a href="#" class="current">2</a><a href="#">3</a><a href="#">4</a
      ><a href="#">5</a><a href="#">6</a><a href="#" class="elp">...</a
      ><a href="#" class="next">下一页&gt;&gt;</a> 到第 <input type="text" /> 页
      <button>确定</button>
    </div>
    <div class="box2">
      <a href="">1</a><a href="">2</a><a href="">3</a><a href="">4</a>
    </div>
  </body>
</html>
