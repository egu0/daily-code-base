<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    * {
      padding: 0;
      margin: 0;
    }
    .box {
      width: 300px;
      height: 70px;
      background-color: #eee;
      margin: 100px auto;
      padding: 5px;
    }
    .box p {
      font-size: 16px;
    }
    .pic {
      float: left;
      width: 120px;
      height: 70px;
      margin-right: 5px;
    }
    .pic img {
      width: 100%;
      object-fit: cover;
      height: 100%;
    }
  </style>
  <body>
    <div class="box">
      <div class="pic">
        <img src="images/ldh.jpg" alt="" />
      </div>
      <p>【集锦】热身赛-巴西0-1秘鲁 内马尔替补两人血染赛场</p>
    </div>
  </body>
</html>
