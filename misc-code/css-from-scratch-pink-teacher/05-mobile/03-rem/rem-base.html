<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      div {
        font-size: 12px;
      }
      p {
        /* em 单位是相对于父元素的「字体大小」来说的 */
        /* 10 * 12 = 120px */
        width: 10em;
        height: 10em;
        background-color: pink;
      }
      /* -------------- */
      html {
        font-size: 14px;
      }
      ul {
        margin: 0;
        padding: 0;
        /* rem 单位是相对于 html 元素的「字体大小」来说的 */
        /* 10 * 14 = 140px */
        width: 10rem;
        height: 10rem;
        background-color: purple;
      }
    </style>
  </head>
  <body>
    <div>
      <p></p>
    </div>
    <ul></ul>
  </body>
</html>
