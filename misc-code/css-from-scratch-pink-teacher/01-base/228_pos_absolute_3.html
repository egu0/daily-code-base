<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    .father {
      position: relative;
      height: 400px;
      width: 400px;
      background-color: skyblue;
    }
    .son {
      position: absolute;
      top: 10px;
      left: 10px;
      height: 200px;
      width: 200px;
      background-color: pink;
    }
    .son2 {
      height: 200px;
      background-color: purple;
    }
  </style>
  <body>
    <div class="grandfa">
      <div class="father">
        <div class="son2"></div>
        <div class="son"></div>
      </div>
    </div>
  </body>
</html>
