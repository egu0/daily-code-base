<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    .tudou {
      position: relative;
      width: 444px;
      height: 320px;
      background-color: pink;
      margin: 30px auto;
    }
    .tudou img {
      width: 100%;
      height: 100%;
    }
    /* .mask { */
    .tudou::before {
      content: '';
      /* 隐藏遮罩层 */
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3) url(./images/arr.png) no-repeat center;
    }
    /* 鼠标经过 .tudou, 让 .mask 显示 */
    /* .tudou:hover .mask { */
    .tudou:hover::before {
      display: block;
      cursor: grabbing;
    }
  </style>
  <body>
    <div class="tudou">
      <!-- <div class="mask"></div> -->
      <img src="images/tudou.jpg" alt="" />
    </div>
    <div class="tudou">
      <img src="images/tudou.jpg" alt="" />
    </div>
    <div class="tudou">
      <img src="images/tudou.jpg" alt="" />
    </div>
    <div class="tudou">
      <img src="images/tudou.jpg" alt="" />
    </div>
  </body>
</html>
