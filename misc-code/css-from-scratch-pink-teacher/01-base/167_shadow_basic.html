<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }
    #shadow {
      width: 200px;
      height: 200px;
      background-color: pink;
      margin: 50px auto;
    }
    #shadow:hover {
      box-shadow: 5px 5px 10px 5px rgba(0, 0, 0, 0.2);
    }
  </style>
  <body>
    <div id="shadow"></div>
  </body>
</html>
