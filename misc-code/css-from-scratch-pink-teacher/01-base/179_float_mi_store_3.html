<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    * {
      padding: 0;
      margin: 0;
    }
    li {
      list-style: none;
    }
    .box {
      width: 1226px;
      height: 615px;
      background-color: #cfa;
      margin: 50px auto;
    }
    .left {
      width: 234px;
      height: 615px;
      background-color: #666;
      float: left;
    }
    .right {
      width: 992px;
      height: 615px;
      float: left;
    }
    .right > li {
      /* 网页布局第二准则：先设置盒子大小，之后设置盒子位置 */
      width: 234px;
      height: 300px;
      background-color: #fff;
      float: left;
      margin-left: 14px;
      margin-bottom: 14px;
    }
  </style>
  <body>
    <div class="box">
      <div class="left"></div>
      <ul class="right">
        <li>1</li>
        <li>2</li>
        <li>3</li>
        <li>4</li>
        <li>5</li>
        <li>6</li>
        <li>7</li>
        <li>8</li>
      </ul>
    </div>
  </body>
</html>
